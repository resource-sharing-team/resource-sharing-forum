services:
  mysql:
    image: mysql:8.0
    container_name: resource-sharing-forum-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-resource_sharing_forum}
      MYSQL_USER: ${MYSQL_APP_USER:-forum_app}
      MYSQL_PASSWORD: ${MYSQL_APP_PASSWORD:?Set MYSQL_APP_PASSWORD in .env}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: resource-sharing-forum-backend:latest
    container_name: resource-sharing-forum-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
      DB_URL: "jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-resource_sharing_forum}?useUnicode=true&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true"
      DB_USERNAME: ${MYSQL_APP_USER:-forum_app}
      DB_PASSWORD: ${MYSQL_APP_PASSWORD:?Set MYSQL_APP_PASSWORD in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-120}
      UPLOAD_ROOT_DIR: /app/uploads
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB:-100}
      UPLOAD_MAX_FILES_PER_RESOURCE: ${UPLOAD_MAX_FILES_PER_RESOURCE:-5}
      UPLOAD_MAX_FILE_SIZE: ${UPLOAD_MAX_FILE_SIZE:-100MB}
      UPLOAD_MAX_REQUEST_SIZE: ${UPLOAD_MAX_REQUEST_SIZE:-500MB}
      DB_POOL_MIN_IDLE: ${DB_POOL_MIN_IDLE:-10}
      DB_POOL_MAX_SIZE: ${DB_POOL_MAX_SIZE:-50}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-30}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      TZ: Asia/Shanghai
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

volumes:
  mysql_data:
    name: resource-sharing-forum_mysql_data
  backend_uploads:
    name: resource-sharing-forum_backend_uploads
