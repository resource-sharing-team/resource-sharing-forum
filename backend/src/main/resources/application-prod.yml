server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: ${DB_POOL_MIN_IDLE:10}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:50}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
  sql:
    init:
      mode: never
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:100MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:500MB}

forum:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  rate-limit:
    auth-window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
    auth-max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:30}
  jwt:
    secret: ${JWT_SECRET}
    expires-minutes: ${JWT_EXPIRES_MINUTES:120}
  upload:
    root-dir: ${UPLOAD_ROOT_DIR:/app/uploads}
    allowed-types: ${UPLOAD_ALLOWED_TYPES:pdf,doc,docx,ppt,pptx,xls,xlsx,zip,rar,7z,png,jpg,jpeg,txt,md}
    max-file-size-mb: ${UPLOAD_MAX_FILE_SIZE_MB:100}
    max-files-per-resource: ${UPLOAD_MAX_FILES_PER_RESOURCE:5}

logging:
  level:
    com.resourcesharing.forum: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: WARN
