server:
  port: 8080

spring:
  application:
    name: resource-sharing-forum-backend
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 500MB

forum:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000}
  rate-limit:
    auth-window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
    auth-max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:30}
  jwt:
    secret: resource-sharing-forum-dev-secret-must-be-changed-2026
    expires-minutes: 120
  upload:
    root-dir: ./uploads
    allowed-types: pdf,doc,docx,ppt,pptx,xls,xlsx,zip,rar,7z,png,jpg,txt,md
    max-file-size-mb: 100
    max-files-per-resource: 5

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/resource_sharing_forum?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

