name: CD - Deploy Backend to Windows Server

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        shell: powershell

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: |
          cd backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/resource-sharing-forum-backend:latest .

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/resource-sharing-forum-backend:latest

      - name: Deploy on server
        run: |
          $path = "${{ secrets.SERVER_DEPLOY_PATH }}"
          $shortPath = (New-Object -ComObject Scripting.FileSystemObject).GetFolder($path).ShortPath
          Push-Location -LiteralPath $shortPath
          docker compose down
          docker compose pull
          docker compose up -d
          Pop-Location
        shell: powershell

      - name: Health check
        run: |
          Start-Sleep -Seconds 10
          try {
              $response = Invoke-WebRequest -UseBasicParsing -Uri "http://localhost:18080/api/health" -ErrorAction Stop
              Write-Host "Health check passed"
              Write-Host $response.Content
              if ($response.StatusCode -ne 200) { exit 1 }
          } catch {
              Write-Host "Health check failed: $_"
              exit 1
          }
        shell: powershell
